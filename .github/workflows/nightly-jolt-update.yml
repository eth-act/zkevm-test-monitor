name: Nightly Jolt ZKVM Update

on:
  schedule:
    # Run daily at 3:00 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force build+test even if upstream commit has not changed'
        type: boolean
        default: false

permissions:
  contents: write
  actions: read
  issues: write

concurrency:
  group: jolt-update
  cancel-in-progress: true

jobs:
  update-jolt:
    uses: ./.github/workflows/build-and-test-zkvm.yml
    with:
      zkvm: jolt
      # Jolt proving needs ~16GB RAM per test instance
      runner: '["self-hosted-ghr", "size-xl-x64"]'
      force: ${{ github.event.inputs.force == 'true' }}
