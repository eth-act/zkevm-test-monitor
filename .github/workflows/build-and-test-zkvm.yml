name: Update ZKVM

on:
  workflow_call:
    inputs:
      zkvm:
        required: true
        type: string
        description: 'Name of the ZKVM to update (e.g., jolt, zisk)'
      runner:
        type: string
        required: false
        default: '["ubuntu-latest"]'
        description: 'Runner labels as JSON array (e.g., ["ubuntu-latest"] or ["self-hosted-ghr", "size-xl-x64"])'
      force:
        type: boolean
        required: false
        default: false
        description: 'Force build+test even if upstream commit has not changed'
      dry_run:
        type: boolean
        required: false
        default: false
        description: 'Run build+test but do not commit or push results back to the repo'

permissions:
  contents: write
  actions: read
  issues: write

jobs:
  update:
    runs-on: ${{ fromJSON(inputs.runner) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Git configuration
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq python3 python3-pip python3-yaml libopenmpi-dev

      - name: Get latest commit
        id: zkvm-commit
        run: |
          ZKVM="${{ inputs.zkvm }}"

          # Get the current commit hash from config.json
          CURRENT_COMMIT=$(jq -r ".zkvms.${ZKVM}.commit" config.json)
          echo "Current ${ZKVM} commit: $CURRENT_COMMIT"

          # Get the latest commit hash from the main branch of the remote repository
          REPO_URL=$(jq -r ".zkvms.${ZKVM}.repo_url" config.json)
          LATEST_COMMIT=$(git ls-remote $REPO_URL refs/heads/main | cut -f1 | head -c8)
          echo "Latest ${ZKVM} commit from main branch: $LATEST_COMMIT"

          # Check if there's an update available (or forced)
          FORCE="${{ inputs.force }}"
          if [ "$FORCE" = "true" ]; then
            echo "needs_update=true" >> $GITHUB_OUTPUT
            echo "current_commit=$CURRENT_COMMIT" >> $GITHUB_OUTPUT
            echo "latest_commit=${LATEST_COMMIT:-$CURRENT_COMMIT}" >> $GITHUB_OUTPUT
            echo "⚡ Force mode: running build+test regardless of commit change"
          elif [ "$CURRENT_COMMIT" != "$LATEST_COMMIT" ]; then
            echo "needs_update=true" >> $GITHUB_OUTPUT
            echo "current_commit=$CURRENT_COMMIT" >> $GITHUB_OUTPUT
            echo "latest_commit=$LATEST_COMMIT" >> $GITHUB_OUTPUT
            echo "🔄 ${ZKVM} update available: $CURRENT_COMMIT -> $LATEST_COMMIT"
          else
            echo "needs_update=false" >> $GITHUB_OUTPUT
            echo "✅ ${ZKVM} is up to date at commit $CURRENT_COMMIT"
          fi

      - name: Update config.json with latest commit
        if: steps.zkvm-commit.outputs.needs_update == 'true'
        run: |
          ZKVM="${{ inputs.zkvm }}"
          LATEST_COMMIT=${{ steps.zkvm-commit.outputs.latest_commit }}
          echo "📝 Updating config.json with commit: $LATEST_COMMIT"

          # Update the commit hash in config.json using jq
          jq --arg zkvm "$ZKVM" --arg commit "$LATEST_COMMIT" '.zkvms[$zkvm].commit = $commit' config.json > config.json.tmp
          mv config.json.tmp config.json

          # Verify the update
          NEW_COMMIT=$(jq -r ".zkvms.${ZKVM}.commit" config.json)
          echo "✅ Updated ${ZKVM} commit to: $NEW_COMMIT"

      - name: Set up Docker Buildx
        if: steps.zkvm-commit.outputs.needs_update == 'true' && !env.ACT
        uses: docker/setup-buildx-action@v3

      - name: Build ZKVM
        if: steps.zkvm-commit.outputs.needs_update == 'true'
        run: |
          ZKVM="${{ inputs.zkvm }}"
          echo "🔨 Building ${ZKVM} ZKVM..."
          # Force rebuild by removing existing binary
          rm -f binaries/${ZKVM}-binary

          # Run the build script
          FORCE=1 ./src/build.sh ${ZKVM}
        continue-on-error: true
        id: build-zkvm

      - name: Install Rust (for act4-runner)
        if: steps.zkvm-commit.outputs.needs_update == 'true' && steps.build-zkvm.outcome == 'success'
        uses: dtolnay/rust-toolchain@stable

      - name: Test ZKVM
        if: steps.zkvm-commit.outputs.needs_update == 'true' && steps.build-zkvm.outcome == 'success'
        run: |
          ZKVM="${{ inputs.zkvm }}"
          echo "🧪 Testing ${ZKVM} ZKVM..."

          # Run ACT4 tests (split pipeline for jolt/zisk, legacy Docker for others)
          JOBS=1 ./src/test.sh ${ZKVM}
        continue-on-error: true
        id: test-zkvm

      - name: Record test failure
        if: steps.zkvm-commit.outputs.needs_update == 'true' && steps.build-zkvm.outcome == 'success' && steps.test-zkvm.outcome == 'failure'
        run: |
          ZKVM="${{ inputs.zkvm }}"

          # Create placeholder summary files for ACT4 suites
          mkdir -p test-results/${ZKVM}
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          for LABEL in full-isa standard-isa; do
            if [ ! -f "test-results/${ZKVM}/summary-act4-${LABEL}.json" ]; then
              jq -n \
                --arg zkvm "$ZKVM" \
                --arg label "$LABEL" \
                --arg timestamp "$TIMESTAMP" \
                '{zkvm: $zkvm, label: $label, timestamp: $timestamp, passed: 0, failed: 0, total: 0}' \
                > "test-results/${ZKVM}/summary-act4-${LABEL}.json"
            fi
          done

      - name: Check for changes and commit
        if: steps.zkvm-commit.outputs.needs_update == 'true'
        run: |
          # Check if there are any changes to commit
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit"
            echo "has_changes=false" >> $GITHUB_ENV
          else
            echo "Changes detected, preparing to commit"
            echo "has_changes=true" >> $GITHUB_ENV

            # Show what changed
            echo "📋 Files changed:"
            git diff --name-only
            git diff --cached --name-only
          fi

      - name: Commit and push changes
        if: steps.zkvm-commit.outputs.needs_update == 'true' && env.has_changes == 'true' && inputs.dry_run != true
        run: |
          ZKVM="${{ inputs.zkvm }}"
          CURRENT_COMMIT=${{ steps.zkvm-commit.outputs.current_commit }}
          LATEST_COMMIT=${{ steps.zkvm-commit.outputs.latest_commit }}

          # Add config and test history
          git add config.json data/ || true

          # Create commit message with build/test status
          COMMIT_MSG="chore: update ${ZKVM} ZKVM from $CURRENT_COMMIT to $LATEST_COMMIT"

          if [ "${{ steps.build-zkvm.outcome }}" = "success" ]; then
            COMMIT_MSG="${COMMIT_MSG}"$'\n\n'"✅ Build: successful"
          else
            COMMIT_MSG="${COMMIT_MSG}"$'\n\n'"❌ Build: failed"
          fi

          if [ "${{ steps.test-zkvm.outcome }}" = "success" ]; then
            COMMIT_MSG="${COMMIT_MSG}"$'\n'"✅ Tests: completed"
          elif [ "${{ steps.build-zkvm.outcome }}" = "success" ]; then
            COMMIT_MSG="${COMMIT_MSG}"$'\n'"❌ Tests: failed"
          else
            COMMIT_MSG="${COMMIT_MSG}"$'\n'"⚠️ Tests: skipped (build failed)"
          fi

          COMMIT_MSG="${COMMIT_MSG}"$'\n\n'"🤖 Automated nightly update"

          # Commit changes
          git commit -m "$COMMIT_MSG"

          # Push changes
          git push origin main

          echo "✅ Changes committed and pushed successfully"

      - name: Trigger dashboard deploy
        if: steps.zkvm-commit.outputs.needs_update == 'true' && env.has_changes == 'true' && inputs.dry_run != true
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main'
            });
            console.log('Triggered dashboard deploy');

      - name: Fail job if tests failed
        if: steps.zkvm-commit.outputs.needs_update == 'true' && steps.test-zkvm.outcome == 'failure'
        run: |
          echo "❌ Tests failed - marking job as failed"
          exit 1

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const zkvm = '${{ inputs.zkvm }}';
            const current_commit = '${{ steps.zkvm-commit.outputs.current_commit }}' || 'unknown';
            const latest_commit = '${{ steps.zkvm-commit.outputs.latest_commit }}' || 'unknown';
            const needs_update = '${{ steps.zkvm-commit.outputs.needs_update }}';
            const zkvm_commit_outcome = '${{ steps.zkvm-commit.outcome }}';
            const run_url = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            // Determine if this was an early infrastructure failure
            const isInfraFailure = zkvm_commit_outcome === 'skipped' || zkvm_commit_outcome === '';

            // Check if there's already an open issue for failed updates
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: `automated,${zkvm}-update,failed`
            });

            if (issues.data.length === 0) {
              // Build issue body based on failure type
              let bodyLines;
              if (isInfraFailure) {
                bodyLines = [
                  `## ${zkvm.toUpperCase()} ZKVM Update Failed (Infrastructure)`,
                  '',
                  '**Failure Type:** Early infrastructure failure (before version check)',
                  '',
                  `**Workflow Run:** ${run_url}`,
                  '',
                  '### What Happened',
                  'The workflow failed before it could check for updates. This is typically caused by:',
                  '- Runner connectivity issues (e.g., apt proxy/cache unavailable)',
                  '- Missing dependencies or setup failures',
                  '- GitHub Actions infrastructure problems',
                  '',
                  '### Next Steps',
                  `1. Check the [workflow run](${run_url}) for detailed error logs`,
                  '2. Investigate infrastructure/runner issues',
                  '3. Re-run the workflow once the issue is resolved',
                  '4. Close this issue once resolved',
                  '',
                  'This issue was created automatically by the nightly update workflow.'
                ];
              } else {
                bodyLines = [
                  `## ${zkvm.toUpperCase()} ZKVM Update Failed`,
                  '',
                  `**Attempted Update:** \`${current_commit}\` → \`${latest_commit}\``,
                  '',
                  `**Workflow Run:** ${run_url}`,
                  '',
                  '### Status Summary',
                  `- **Build Status:** ${{ steps.build-zkvm.outcome }}`,
                  `- **Test Status:** ${{ steps.test-zkvm.outcome }}`,
                  '',
                  '### Next Steps',
                  `1. Check the [workflow run](${run_url}) for detailed error logs`,
                  '2. Investigate build/test failures',
                  '3. Fix any issues and manually trigger the workflow',
                  '4. Close this issue once resolved',
                  '',
                  'This issue was created automatically by the nightly update workflow.'
                ];
              }

              // Create new issue only if none exists
              const title = isInfraFailure
                ? `🚨 Nightly ${zkvm.toUpperCase()} ZKVM Update Failed (Infrastructure)`
                : `🚨 Nightly ${zkvm.toUpperCase()} ZKVM Update Failed`;

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                labels: ['automated', `${zkvm}-update`, 'failed'],
                body: bodyLines.join('\n')
              });
              console.log(`Created issue for failed ${zkvm} update`);
            } else {
              console.log(`Issue already exists for failed ${zkvm} updates`);
            }

      - name: Post job summary
        if: always()
        run: |
          ZKVM="${{ inputs.zkvm }}"
          ZKVM_UPPER=$(echo "$ZKVM" | tr '[:lower:]' '[:upper:]')

          echo "## Nightly ${ZKVM_UPPER} ZKVM Update Summary" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.zkvm-commit.outputs.needs_update }}" = "true" ]; then
            echo "### Update Status: 🔄 Update Available" >> $GITHUB_STEP_SUMMARY
            echo "- **From:** \`${{ steps.zkvm-commit.outputs.current_commit }}\`" >> $GITHUB_STEP_SUMMARY
            echo "- **To:** \`${{ steps.zkvm-commit.outputs.latest_commit }}\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            # Build status
            if [ "${{ steps.build-zkvm.outcome }}" = "success" ]; then
              echo "### 🔨 Build: ✅ Successful" >> $GITHUB_STEP_SUMMARY
            else
              echo "### 🔨 Build: ❌ Failed" >> $GITHUB_STEP_SUMMARY
            fi

            # Test status
            if [ "${{ steps.test-zkvm.outcome }}" = "success" ]; then
              echo "### 🧪 Tests: ✅ Completed" >> $GITHUB_STEP_SUMMARY
            elif [ "${{ steps.build-zkvm.outcome }}" = "success" ]; then
              echo "### 🧪 Tests: ❌ Failed" >> $GITHUB_STEP_SUMMARY
            else
              echo "### 🧪 Tests: ⚠️ Skipped (build failed)" >> $GITHUB_STEP_SUMMARY
            fi

            # Commit status
            if [ "${{ inputs.dry_run }}" = "true" ]; then
              echo "### 📝 Changes: 🔍 Dry run (not committed)" >> $GITHUB_STEP_SUMMARY
            elif [ "${{ env.has_changes }}" = "true" ]; then
              echo "### 📝 Changes: ✅ Committed and pushed" >> $GITHUB_STEP_SUMMARY
            else
              echo "### 📝 Changes: ℹ️ No changes to commit" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "### Update Status: ✅ Already Up to Date" >> $GITHUB_STEP_SUMMARY
            echo "${ZKVM_UPPER} ZKVM is already at the latest commit: \`$(jq -r ".zkvms.${ZKVM}.commit" config.json)\`" >> $GITHUB_STEP_SUMMARY
          fi
